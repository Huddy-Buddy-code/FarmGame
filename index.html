<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Logistics Sim</title>
    <style>
      :root {
        --cream: #faf3e3;
        --cream-2: #f1e4c8;
        --wood: #8a5a33;
        --wood-dark: #6b4426;
        --ink: #4a3520;
        --green: #6da144;
        --green-dark: #55832f;
        --gold: #e0a63c;
        --red: #c75146;
        --shadow: 0 3px 10px rgba(60, 40, 15, 0.35);
      }
      html, body { margin: 0; height: 100%; background: #111; overflow: hidden; }
      body { font: 14px/1.45 "Segoe UI", system-ui, sans-serif; color: var(--ink); }
      #map { position: absolute; inset: 0; }

      .panel {
        background: var(--cream);
        border: 2px solid var(--wood);
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      /* ---------- Top HUD bar ---------- */
      #topbar {
        position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
        z-index: 20; display: flex; align-items: center; gap: 10px;
        padding: 8px 14px; white-space: nowrap;
      }
      .stat { display: flex; align-items: center; gap: 5px; font-weight: 600; }
      .stat .icon { font-size: 17px; }
      .divider { width: 2px; height: 22px; background: var(--cream-2); border-radius: 2px; }

      /* ---------- Year bar (position in the year, season-themed) ---------- */
      #yearbar {
        position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
        z-index: 19; width: 380px; padding: 3px 10px 5px;
        border-radius: 10px;
      }
      #yearbar .seasons { display: flex; height: 10px; border-radius: 999px; overflow: hidden; border: 1.5px solid var(--wood); position: relative; }
      #yearbar .seg { flex: 1; }
      #yearbar .seg.spring { background: #a8d178; }
      #yearbar .seg.summer { background: #f5c95d; }
      #yearbar .seg.fall   { background: #d98e4a; }
      #yearbar .seg.winter { background: #bcd8e8; }
      #yearbar .marker {
        position: absolute; top: -3px; bottom: -3px; width: 3px; border-radius: 2px;
        background: var(--ink); box-shadow: 0 0 0 1.5px var(--cream);
      }
      #yearbar .labels { display: flex; font-size: 11px; margin-top: 1px; }
      #yearbar .labels span { flex: 1; text-align: center; }

      /* ---------- Time controls ---------- */
      #timebar {
        position: absolute; top: 102px; left: 50%; transform: translateX(-50%);
        z-index: 20; display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      }
      button {
        font: inherit; font-weight: 600; color: var(--ink); cursor: pointer;
        background: var(--cream-2); border: 2px solid var(--wood);
        border-radius: 10px; padding: 4px 12px;
        transition: transform 0.06s, background 0.15s;
      }
      button:hover { background: #ead9b5; }
      button:active { transform: scale(0.95); }
      button.active { background: var(--green); border-color: var(--green-dark); color: #fff; }
      button.primary { background: var(--green); border-color: var(--green-dark); color: #fff; }
      button.primary:hover { background: var(--green-dark); }
      select {
        font: inherit; font-weight: 600; color: var(--ink);
        background: var(--cream-2); border: 2px solid var(--wood);
        border-radius: 10px; padding: 4px 8px; cursor: pointer;
      }

      /* ---------- Bottom toolbar ---------- */
      #toolbar {
        position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
        z-index: 20; display: flex; gap: 8px; padding: 8px 12px;
      }

      /* ---------- Field panel ---------- */
      #fieldpanel {
        position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
        z-index: 25; width: 250px; padding: 14px 16px; display: none;
      }
      #fieldpanel h2 { margin: 0 0 2px; font-size: 17px; }
      #fieldpanel .sub { color: #8a7658; font-size: 12px; margin-bottom: 10px; }
      #fieldpanel .close {
        position: absolute; top: 8px; right: 10px; border: none; background: none;
        font-size: 16px; padding: 2px 6px; color: #8a7658;
      }
      .badge {
        display: inline-block; padding: 2px 10px; border-radius: 999px;
        font-size: 12px; font-weight: 700; color: #fff; background: var(--gold);
        text-transform: capitalize;
      }
      .cropbtns { display: flex; gap: 8px; margin: 10px 0 4px; }
      .cropbtns button { flex: 1; padding: 8px 4px; font-size: 13px; }
      .rangebar {
        position: relative; height: 14px; margin: 6px 0 2px;
        background: var(--cream-2); border: 1.5px solid var(--wood); border-radius: 999px;
        overflow: hidden;
      }
      .rangebar .band { position: absolute; top: 0; bottom: 0; background: var(--green); opacity: 0.75; }
      .small { font-size: 12px; color: #8a7658; }
      .progress { height: 10px; background: var(--cream-2); border: 1.5px solid var(--wood); border-radius: 999px; overflow: hidden; margin: 6px 0; }
      .progress .fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
      #fp-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
      #fp-msg { font-size: 12px; color: var(--red); min-height: 15px; margin-top: 4px; }

      /* ---------- Crop calendar ---------- */
      #cropcal {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 30; width: min(640px, 92vw); padding: 16px 20px 18px; display: none;
      }
      #cropcal h2 { margin: 0 0 2px; font-size: 18px; }
      #cropcal .legend { font-size: 12px; color: #8a7658; margin-bottom: 10px; display: flex; gap: 14px; }
      #cropcal .chip { display: inline-block; width: 22px; height: 10px; border-radius: 999px; vertical-align: middle; margin-right: 4px; border: 1px solid var(--wood); }
      #cropcal .chip.plant { background: var(--green); }
      #cropcal .chip.harv { background: var(--gold); }
      #cropcal .close {
        position: absolute; top: 10px; right: 12px; border: none; background: none;
        font-size: 16px; padding: 2px 6px; color: #8a7658;
      }
      #cal-grid { position: relative; display: grid; grid-template-columns: 110px repeat(12, 1fr); row-gap: 6px; align-items: center; }
      #cal-grid .seasonhead { font-size: 15px; text-align: center; padding-bottom: 1px; }
      #cal-grid .mo { font-size: 11px; font-weight: 700; text-align: center; color: #8a7658; border-bottom: 2px solid var(--cream-2); padding-bottom: 3px; }
      #cal-grid .crop { font-weight: 600; font-size: 13px; }
      #cal-grid .lane { position: relative; height: 16px; background: var(--cream-2); border-radius: 999px; grid-column: 2 / span 12; }
      #cal-grid .band { position: absolute; top: 2px; bottom: 2px; border-radius: 999px; opacity: 0.9; }
      #cal-grid .band.plant { background: var(--green); }
      #cal-grid .band.harv { background: var(--gold); }
      #cal-now { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); opacity: 0.7; border-radius: 2px; pointer-events: none; }
      #cal-now::after { content: "▼"; position: absolute; top: -14px; left: -5px; font-size: 10px; color: var(--red); }

      /* ---------- Inventory ---------- */
      #inventory {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 30; width: min(430px, 92vw); padding: 16px 20px 18px; display: none;
      }
      #inventory h2 { margin: 0 0 2px; font-size: 18px; }
      #inventory .sub { font-size: 12px; color: #8a7658; margin-bottom: 10px; }
      #inventory .close {
        position: absolute; top: 10px; right: 12px; border: none; background: none;
        font-size: 16px; padding: 2px 6px; color: #8a7658;
      }
      .inv-row {
        display: flex; align-items: center; gap: 10px;
        background: var(--cream-2); border: 1.5px solid var(--wood);
        border-radius: 12px; padding: 8px 12px; margin: 8px 0;
      }
      .inv-row .icon { font-size: 22px; }
      .inv-row .info { flex: 1; }
      .inv-row .name { font-weight: 700; }
      .inv-row .qty { font-size: 12px; color: #8a7658; }
      .inv-row .price { font-size: 12px; color: #8a7658; text-align: right; margin-right: 4px; }
      .inv-row button:disabled { opacity: 0.45; cursor: default; }

      /* ---------- Toast + montage ---------- */
      #toast {
        position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
        z-index: 40; padding: 8px 18px; font-weight: 600; display: none;
      }
      #montage {
        position: absolute; inset: 0; z-index: 50; display: none;
        background: rgba(30, 20, 8, 0.35); backdrop-filter: blur(1px);
        align-items: center; justify-content: center; pointer-events: all;
      }
      #montage .card { padding: 18px 34px; font-size: 22px; font-weight: 700; text-align: center; }
      #montage .card .mo { font-size: 30px; }

      /* ---------- Dev corner ---------- */
      #dev {
        position: absolute; bottom: 12px; left: 12px; z-index: 15;
        font-size: 11px; color: #cbb; background: rgba(0,0,0,0.55);
        padding: 6px 9px; border-radius: 8px; max-width: 260px;
      }
      #dev .ok { color: #8e8; }
      #dev .err { color: #f88; }
      #dev .row { margin: 1px 0; }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div id="resetbar" style="position:absolute; top:10px; left:10px; z-index:20;">
      <button id="btn-reset" class="panel" title="Wipe the save and start a new farm" style="padding:6px 12px;">🔄 Reset</button>
    </div>

    <div id="topbar" class="panel">
      <div class="stat"><span class="icon">📅</span><span id="hud-date">—</span></div>
      <div class="divider"></div>
      <div class="stat"><span class="icon">💰</span><span id="hud-cash">—</span></div>
      <div class="divider"></div>
      <div class="stat"><span class="icon">🌽</span><span id="hud-corn">0 t</span></div>
      <div class="stat"><span class="icon">🫘</span><span id="hud-soy">0 t</span></div>
    </div>

    <div id="yearbar" class="panel">
      <div class="seasons">
        <div class="seg spring"></div><div class="seg summer"></div>
        <div class="seg fall"></div><div class="seg winter"></div>
        <div class="marker" id="year-marker"></div>
      </div>
      <div class="labels"><span>🌱 Spring</span><span>☀️ Summer</span><span>🍂 Fall</span><span>❄️ Winter</span></div>
    </div>

    <div id="timebar" class="panel">
      <button id="spd-pause" title="Pause">⏸</button>
      <button id="spd-1" class="active" title="Real time">1×</button>
      <button id="spd-60" title="60× speed — a sim-hour per real minute">60×</button>
      <button id="spd-600" title="600× speed — a sim-day in ~2.4 real minutes">600×</button>
      <select id="skip-month" title="Skip ahead to the 1st of a month">
        <option value="">⏭ Skip to…</option>
      </select>
    </div>

    <div id="toolbar" class="panel">
      <button id="btn-field" class="primary">🚜 Buy Field</button>
      <button id="btn-cropcal">📆 Crop Calendar</button>
      <button id="btn-inventory">📦 Inventory</button>
    </div>

    <div id="inventory" class="panel">
      <button class="close" id="inv-close">✕</button>
      <h2>📦 Grain Storage</h2>
      <div class="sub">On-farm bins · sold at local flat price (market & hauling coming soon)</div>
      <div id="inv-rows"></div>
    </div>

    <div id="cropcal" class="panel">
      <button class="close" id="cal-close">✕</button>
      <h2>📆 Crop Calendar</h2>
      <div class="legend">
        <span><span class="chip plant"></span>Planting</span>
        <span><span class="chip harv"></span>Harvest</span>
      </div>
      <div id="cal-grid"></div>
    </div>

    <div id="fieldpanel" class="panel">
      <button class="close" id="fp-close">✕</button>
      <h2 id="fp-title">Field</h2>
      <div class="sub" id="fp-sub">— acres</div>
      <div><span class="badge" id="fp-status">stubble</span></div>
      <div id="fp-body"></div>
      <div id="fp-actions"></div>
      <div id="fp-msg"></div>
    </div>

    <div id="toast" class="panel"></div>

    <div id="montage"><div class="card panel"><div class="mo" id="montage-month">April</div><div>The weeks roll by…</div></div></div>

    <div id="dev">
      <div class="row" id="status-naip">NAIP: …</div>
      <div class="row" id="status-osm">Roads: …</div>
      <div class="row" id="status-route"></div>
      <div class="row" id="attr"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
